<section class="block block--dark block--skewed-left hero">
  <div class="container">
    <div class="grid grid--cols-2">
      <header class="block__header hero__content">
        <h1>Cloud Hosting for Pros</h1>
        <p class="hero__tagline">
          Deploy your websites in less than 60 seconds.
        </p>
        <a href="#" class="btn btn--accent btn--stretched">Get started</a>
      </header>
      <img class="hero__image" src="images/banner.png" alt="" />
    </div>
  </div>
</section>

<!-- optimized image version -->
<section class="block block--dark block--skewed-left hero">
  <div class="container">
    <div class="grid grid--cols-2">
      <header class="block__header hero__content">
        <h1>Cloud Hosting for Pros</h1>
        <p class="hero__tagline">
          Deploy your websites in less than 60 seconds.
        </p>
        <a href="#" class="btn btn--accent btn--stretched">Get started</a>
      </header>
      <picture>
        <source
          type="image/webp"
          srcset="images/banner@1x.webp 1x, images/banner@2x.webp 2x"
        />
        <source
          type="image/png"
          srcset="images/banner@1x.png 1x, images/banner@2x.png 2x"
        />
        <img class="hero__image" src="images/banner@1x.png" alt="" />
      </picture>
    </div>
  </div>
</section>
